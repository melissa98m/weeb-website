name: Deploy Storybook

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      # Job 1: Récupérer le code
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Job 2: Installer les dépendances
      - run: npm install

      # Job 3: Construire la version statique de Storybook
      - run: npm run build-storybook

      - name: Vérifier le dossier storybook-static
        run: |
          test -d storybook-static
          test -f storybook-static/index.html
          ls -la storybook-static

      - name: Vérifier VERCEL_TOKEN
        if: ${{ !env.VERCEL_TOKEN }}
        run: |
          echo "ERREUR: le secret GitHub 'VERCEL_TOKEN' est manquant."
          echo "Ajoutez-le via Settings > Secrets and variables > Actions."
          exit 1

      - name: Vérifier VERCEL_PROJECT_ID
        if: ${{ !env.VERCEL_PROJECT_ID }}
        run: |
          echo "ERREUR: le secret GitHub 'VERCEL_PROJECT_ID' est manquant."
          echo "Ajoutez-le via Settings > Secrets and variables > Actions."
          exit 1

      - name: Vérifier VERCEL_ORG_ID
        if: ${{ !env.VERCEL_ORG_ID }}
        run: |
          echo "ERREUR: le secret GitHub 'VERCEL_ORG_ID' est manquant."
          echo "Ajoutez-le via Settings > Secrets and variables > Actions."
          exit 1

      # Job 4: Déployer sur Vercel (le token est un secret GitHub)
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          # ... autres secrets stockés dans GitHub > Settings > Secrets
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          working-directory: storybook-static
          # Optionnel: arguments Vercel supplémentaires
          vercel-args: "--prebuilt"
